version: "3.9"

services:

  browser-box:
    build:
      context: .
      dockerfile: dockerfile
    container_name: browser-box
    ports:
      - "6080:6080"
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
      - "9222:9222"
    networks:
      - app-network

    tmpfs:
      - /tmp  

  runner:
    build:
      context: ./runner
      dockerfile: dockerfile  
    container_name: runner
    networks:
      - app-network
    depends_on:
      - browser-box
    command: sh -c "echo 'waiting for browser...' && sleep 10 && node cli.js --plan test-plan.json"  

networks:
  app-network:
    driver: bridge            